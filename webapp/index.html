<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subscriptions Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .summary-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0,0,0,0.3);
        }

        .subscriptions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .subscription-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .subscription-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .subscription-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .subscription-cost {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }

        .card-info {
            margin: 10px 0;
            color: #666;
        }

        .card-info strong {
            color: #333;
        }

        .payment-due {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .due-soon {
            background: #ffe0e0;
            color: #d32f2f;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn {
            background: #667eea;
            color: white;
        }

        .cancel-btn {
            background: #ddd;
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .sample-data-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-left: 10px;
        }

        .sample-data-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 My Subscriptions</h1>
            <p>Track all your monthly subscriptions in one place</p>
        </div>

        <div class="summary-card">
            <div class="summary-stats">
                <div class="stat">
                    <div class="stat-value" id="totalCost">$0.00</div>
                    <div class="stat-label">Total Monthly Cost</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="subCount">0</div>
                    <div class="stat-label">Active Subscriptions</div>
                </div>
            </div>
            <button class="add-btn" onclick="showAddModal()">➕ Add New Subscription</button>
            <button class="sample-data-btn" onclick="addSampleData()">Add Sample Data</button>
        </div>

        <div id="subscriptionsList" class="subscriptions-grid"></div>

        <div id="emptyState" class="empty-state">
            <h2>No subscriptions yet</h2>
            <p>Click "Add New Subscription" to get started!</p>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Subscription</h2>
            <form id="subscriptionForm">
                <div class="form-group">
                    <label for="name">Subscription Name *</label>
                    <input type="text" id="name" required placeholder="e.g., Netflix">
                </div>
                <div class="form-group">
                    <label for="cost">Monthly Cost ($) *</label>
                    <input type="number" id="cost" step="0.01" required placeholder="15.99">
                </div>
                <div class="form-group">
                    <label for="paymentDay">Payment Day of Month *</label>
                    <select id="paymentDay" required>
                        <option value="">Select day...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardType">Card Type *</label>
                    <select id="cardType" required>
                        <option value="Visa">Visa</option>
                        <option value="Mastercard">Mastercard</option>
                        <option value="Amex">American Express</option>
                        <option value="Discover">Discover</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardLast4">Card Last 4 Digits *</label>
                    <input type="text" id="cardLast4" maxlength="4" pattern="[0-9]{4}" required placeholder="4532">
                </div>
                <div class="button-group">
                    <button type="submit" class="save-btn">Save</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize storage
        let subscriptions = JSON.parse(localStorage.getItem('subscriptions') || '[]');

        // Populate payment day dropdown
        const paymentDaySelect = document.getElementById('paymentDay');
        for (let i = 1; i <= 28; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = 'Day ' + i;
            paymentDaySelect.appendChild(option);
        }

        function showAddModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = 'Add New Subscription';
            document.getElementById('subscriptionForm').reset();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function saveSubscription(e) {
            e.preventDefault();
            
            const subscription = {
                id: Date.now(),
                name: document.getElementById('name').value,
                cost: parseFloat(document.getElementById('cost').value),
                paymentDay: parseInt(document.getElementById('paymentDay').value),
                cardType: document.getElementById('cardType').value,
                cardLast4: document.getElementById('cardLast4').value
            };

            subscriptions.push(subscription);
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            
            closeModal();
            renderSubscriptions();
        }

        function deleteSubscription(id) {
            if (confirm('Are you sure you want to delete this subscription?')) {
                subscriptions = subscriptions.filter(sub => sub.id !== id);
                localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
                renderSubscriptions();
            }
        }

        function getNextPaymentDate(paymentDay) {
            const now = new Date();
            const today = now.getDate();
            
            let nextPayment = new Date(now.getFullYear(), now.getMonth(), paymentDay);
            
            if (today > paymentDay) {
                nextPayment.setMonth(nextPayment.getMonth() + 1);
            }
            
            return nextPayment.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getDaysUntilPayment(paymentDay) {
            const now = new Date();
            const today = now.getDate();
            
            if (today > paymentDay) {
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                return (daysInMonth - today) + paymentDay;
            } else {
                return paymentDay - today;
            }
        }

        function renderSubscriptions() {
            const container = document.getElementById('subscriptionsList');
            const emptyState = document.getElementById('emptyState');
            
            if (subscriptions.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('totalCost').textContent = '$0.00';
                document.getElementById('subCount').textContent = '0';
                return;
            }

            emptyState.style.display = 'none';
            
            // Calculate totals
            const totalCost = subscriptions.reduce(function(sum, sub) { return sum + sub.cost; }, 0);
            document.getElementById('totalCost').textContent = '$' + totalCost.toFixed(2);
            document.getElementById('subCount').textContent = subscriptions.length;

            // Sort by payment day
            const sortedSubs = subscriptions.slice().sort(function(a, b) { return a.paymentDay - b.paymentDay; });

            container.innerHTML = sortedSubs.map(function(sub) {
                const daysUntil = getDaysUntilPayment(sub.paymentDay);
                const isDueSoon = daysUntil <= 3;
                
                return '<div class="subscription-card">' +
                    '<div class="card-header">' +
                        '<div class="subscription-name">' + sub.name + '</div>' +
                        '<div class="subscription-cost">$' + sub.cost.toFixed(2) + '</div>' +
                    '</div>' +
                    '<div class="card-info">' +
                        '<strong>Next Payment:</strong> ' + getNextPaymentDate(sub.paymentDay) +
                    '</div>' +
                    '<div class="card-info">' +
                        '<strong>Card:</strong> ' + sub.cardType + ' •••• ' + sub.cardLast4 +
                    '</div>' +
                    '<div class="payment-due ' + (isDueSoon ? 'due-soon' : '') + '">' +
                        (daysUntil === 0 ? 'Due Today!' : 
                         daysUntil === 1 ? 'Due Tomorrow' : 
                         'Due in ' + daysUntil + ' days') +
                    '</div>' +
                    '<button class="delete-btn" onclick="deleteSubscription(' + sub.id + ')">Delete</button>' +
                '</div>';
            }).join('');
        }

        function addSampleData() {
            const samples = [
                {
                    id: Date.now() + 1,
                    name: 'Netflix',
                    cost: 15.99,
                    paymentDay: 1,
                    cardType: 'Visa',
                    cardLast4: '4532'
                },
                {
                    id: Date.now() + 2,
                    name: 'Disney+',
                    cost: 10.99,
                    paymentDay: 15,
                    cardType: 'Mastercard',
                    cardLast4: '8765'
                },
                {
                    id: Date.now() + 3,
                    name: 'Spotify',
                    cost: 9.99,
                    paymentDay: 10,
                    cardType: 'Visa',
                    cardLast4: '4532'
                },
                {
                    id: Date.now() + 4,
                    name: 'Amazon Prime',
                    cost: 14.99,
                    paymentDay: 5,
                    cardType: 'Amex',
                    cardLast4: '3210'
                }
            ];

            subscriptions = subscriptions.concat(samples);
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            renderSubscriptions();
        }

        // Event listeners
        document.getElementById('subscriptionForm').addEventListener('submit', saveSubscription);

        // Initial render
        renderSubscriptions();
    </script>
</body>
</html>
